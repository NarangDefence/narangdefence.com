<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#1b2a40"/>

  <g transform="translate(300,236)">
    <!-- Pediment -->
    <polygon points="-84,-82 0,-112 84,-82" fill="none" stroke="#c9a25e" stroke-width="2.5"/>
    <!-- Entablature -->
    <rect x="-80" y="-78" width="160" height="9" fill="#e8dcc3"/>

    <!-- Left column with fluting -->
    <rect x="-66" y="-62" width="18" height="118" fill="#e8dcc3"/>
    <line x1="-60" y1="-58" x2="-60" y2="52" stroke="#1b2a40" stroke-width="1.2"/>
    <line x1="-54" y1="-58" x2="-54" y2="52" stroke="#1b2a40" stroke-width="1.2"/>

    <!-- Right column with fluting -->
    <rect x="48" y="-62" width="18" height="118" fill="#e8dcc3"/>
    <line x1="54" y1="-58" x2="54" y2="52" stroke="#1b2a40" stroke-width="1.2"/>
    <line x1="60" y1="-58" x2="60" y2="52" stroke="#1b2a40" stroke-width="1.2"/>

    <!-- Diagonal stroke of the N -->
    <polygon points="-48,-62 -31,-62 66,56 49,56" fill="#e8dcc3"/>

    <!-- Capitals -->
    <rect x="-70" y="-69" width="26" height="7" fill="#c9a25e"/>
    <rect x="44" y="-69" width="26" height="7" fill="#c9a25e"/>

    <!-- Steps -->
    <rect x="-80" y="56" width="160" height="8" fill="#e8dcc3"/>
    <rect x="-90" y="68" width="180" height="6" fill="#c9a25e"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="418"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="40" font-weight="600" fill="#e8dcc3"
        text-anchor="middle" letter-spacing="8">NARANG</text>
  <text x="300" y="460"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="19" font-weight="300" fill="#c9a25e"
        text-anchor="middle" letter-spacing="16">DEFENCE</text>
</svg>
